// Modal
function abrirModal(cliente) {
  const texto = MENCIONES[cliente] || "Mención no disponible.";
  document.getElementById("modal-titulo").textContent = "📢 " + cliente;
  document.getElementById("modal-text").textContent = texto;
  document.getElementById("overlay").classList.add("visible");
}
function cerrarModal() {
  document.getElementById("overlay").classList.remove("visible");
}
document.getElementById("overlay").addEventListener("click", function(e) {
  if (e.target === this) cerrarModal();
});
document.addEventListener("keydown", e => { if(e.key==="Escape") cerrarModal(); });

// Reloj y flecha
function actualizar() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const total = h*60+m;
  const ampm = h>=12?"PM":"AM", h12=h%12||12, mm=String(m).padStart(2,"0");
  document.getElementById("reloj").textContent = `${h12}:${mm} ${ampm}`;

  let activaIdx = -1;
  for(let i=0; i<activas.length; i++) { if(total>=activas[i].min) activaIdx=i; }

  activas.forEach((_,i) => {
    document.getElementById("fila-"+i).classList.remove("activa");
    document.getElementById("flecha-"+i).textContent="";
  });
  if(activaIdx>=0) {
    const tr = document.getElementById("fila-"+activaIdx);
    tr.classList.add("activa");
    document.getElementById("flecha-"+activaIdx).textContent="👈🏻";
    // tr.scrollIntoView({behavior:"smooth", block:"center"});
  }

  // Flecha LRDR
  let lrdrIdx = -1;
  for(let i=0; i<lrdr.length; i++) { if(total>=lrdr[i].min) lrdrIdx=i; }
  lrdr.forEach((_,i) => {
    const el = document.getElementById("flecha-lrdr-"+i);
    const tr = document.getElementById("fila-lrdr-"+i);
    if(el) el.textContent="";
    if(tr) tr.classList.remove("activa");
  });
  if(lrdrIdx>=0) {
    const tr = document.getElementById("fila-lrdr-"+lrdrIdx);
    const el = document.getElementById("flecha-lrdr-"+lrdrIdx);
    if(tr) tr.classList.add("activa");
    if(el) el.textContent="👈🏻";
  }
}
actualizar();
setInterval(actualizar, 30000);
</script>

    <script>
    async function getSong() {
      try {
        // Agregamos timestamp para forzar que el navegador cargue la versión más nueva
        const timestamp = new Date().getTime();
        const r = await fetch('https://raw.githubusercontent.com/coordinacionmedios-hn/menciones-copan-stereo/main/index.html?t=' + timestamp, {cache: 'no-store'});
        const htmlText = await r.text();
        
        // Extraemos el contenido del div song-title
        const match = htmlText.match(/<div id="song-title">(.*?)<\/div>/);
        if (match && match[1]) {
            const newSong = match[1].trim();
            document.getElementById('song-title').textContent = newSong;
        }
      } catch(e) {
        // Si falla, intentamos desde el servidor local como fallback
        try {
          const r2 = await fetch('https://audience-headache-acetone.ngrok-free.dev/?action=playbackinfo&ngrok-skip-browser-warning=69420');
          const t = await r2.text();
          const xml = new DOMParser().parseFromString(t, "text/xml");
          const trk = xml.querySelector('CurrentTrack TRACK');
          if(trk) {
            const artist = (trk.getAttribute('ARTIST') || '').trim();
            const title = (trk.getAttribute('TITLE') || '').trim();
            const castTitle = (trk.getAttribute('CASTTITLE') || '').trim();
            let displayText = 'Copán Stereo 96.3 FM';
            if(artist && title) {
              displayText = artist + ' - ' + title;
            } else if(castTitle) {
              displayText = castTitle;
            }
            document.getElementById('song-title').textContent = displayText;
          }
        } catch(e2) {}
      }
    }
    setInterval(getSong, 5000);
    getSong();
    </script>
