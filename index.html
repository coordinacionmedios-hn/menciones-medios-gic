<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario de Menciones — Copán Stereo 96.3 FM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #F5F0E8;
    background-image:
      radial-gradient(ellipse at 10% 90%, rgba(200,180,140,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, rgba(180,160,120,0.15) 0%, transparent 50%);
    color: #222;
    padding: 10px;
    min-height: 100vh;
    overflow-x: hidden;
    max-width: 100vw;
    box-sizing: border-box;
  }
  h1 {
    text-align: center;
    color: #2B4590;
    font-size: 1.3em;
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  #reloj {
    text-align: center;
    color: #1a3a7a;
    font-size: 1.2em;
    margin-bottom: 18px;
    font-weight: bold;
    letter-spacing: 3px;
  }
  table {
    width: 100%;
    max-width: 620px;
    margin: 0 auto 24px auto;
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  thead th {
    background: #2B4590;
    color: #fff;
    padding: 10px 14px;
    font-size: 0.95em;
    text-align: center;
  }
  td {
    padding: 8px 14px;
    font-size: 0.95em;
    border-bottom: 1px solid #000;
  }
  td.hora   { text-align: center; font-weight: bold; width: 115px; min-width: 115px; }
  td.cliente { font-weight: bold; cursor: pointer; }
  td.cliente:hover { text-decoration: underline; opacity: 0.85; }
  td.vence  { text-align: center; width: 115px; font-size: 0.88em; }
  td.flecha { text-align: center; width: 36px; font-size: 1.4em; }

  .madrugada { background: #A8CCFF; border-bottom: 1px solid #000; }
  .manana    { background: #A8DCBA; border-bottom: 1px solid #000; }
  .mediodia  { background: #FFE680; border-bottom: 1px solid #000; }
  .tarde     { background: #D8B4F8; border-bottom: 1px solid #000; }
  .atardecer { background: #A8DCBA; border-bottom: 1px solid #000; }
  .lrdr-row  { background: #B8956A; border-bottom: 1px solid #000; }
  .noche     { background: #FFB3C6; }

  tr.activa td { filter: brightness(0.82); }
  tr.activa td.flecha { color: #1a7a1a; font-weight: bold; }

  .sec-title.sec-lrdr th {
    background: #1a1a2e;
    color: #FFFFFF;
    letter-spacing: 1px;
  }
  .sec-title th {
    background: #555;
    color: #fff;
    padding: 8px 14px;
    text-align: center;
    font-size: 0.95em;
  }
  .vencida td { background: #DEDEDE; color: #888; }

  .vence-fecha { color: #b00000; font-weight: bold; }
  .vence-indef { color: #00CC44; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 8px #fff, 0 0 3px #fff; letter-spacing: 0.5px; }

  /* Leyenda */
  .links-institucionales {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding: 28px 8px 28px 8px;
    flex-wrap: wrap;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
  }
  .links-institucionales a {
    color: #2B4590;
    font-weight: bold;
    font-size: 0.95em;
    text-decoration: none;
    background: #f0f4ff;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #2B4590;
  }
  .links-institucionales a:hover { background: #2B4590; color: #fff; }
  .leyenda {
    margin-top: 8px;
    max-width: 620px;
    margin: 0 auto 30px auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .leyenda-item { display: flex; align-items: center; gap: 6px; font-size: 0.82em; color: #444; }
  .leyenda-color { width: 18px; height: 18px; border-radius: 3px; border: 1px solid #aaa; }
  /* Contenedor de vistas sin salto de scroll */
  #contenedor-vistas {
    position: relative;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
  }
  #vista-copan, #vista-ritmo {
    width: 100%;
    transition: opacity 0.15s ease;
  }
  #vista-copan.oculta, #vista-ritmo.oculta {
    position: absolute;
    top: 0; left: 0;
    visibility: hidden;
    pointer-events: none;
    opacity: 0;
    z-index: -1;
  }

  .leyenda-gic {
    width: 100%;
    text-align: center;
    font-size: 0.85em;
    font-weight: 700;
    color: #E91E8C;
    letter-spacing: 1.5px;
    padding: 8px 0 4px 0;
    text-transform: uppercase;
  }


  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 620px;
    margin: 0 auto 6px auto;
  }
  .header-logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
  }
  .header-center { text-align: center; flex: 1; padding: 0 10px; }
  .header-center h1 { margin-bottom: 2px; }
  .header-location {
    text-align: center;
    color: #555;
    font-size: 0.88em;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  /* MODAL */
  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
    overflow-y: auto;
  }
  #overlay.visible { display: flex; }
  #modal {
    background: #fff;
    border-radius: 10px;
    max-width: 600px;
    width: 100%;
    min-height: auto;
    margin: auto;
    padding: 22px 24px 28px 24px;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #modal h2 {
    color: #2B4590;
    font-size: 1.1em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #2B4590;
  }
  #modal-text {
    font-size: 0.88em;
    line-height: 1.65;
    color: #222;
    white-space: pre-wrap;
  }
  #modal-close {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 1.5em;
    cursor: pointer;
    color: #888;
    background: none;
    border: none;
    line-height: 1;
  }
  #modal-close:hover { color: #333; }

      .header-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 620px;
        margin: 0 auto 10px auto;
        background: rgba(255,255,255,0.45);
        padding: 12px 18px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      }
      .header-logo { width: 70px !important; height: 70px !important; object-fit: contain; }
      .header-center { text-align: center; flex: 1; }
      .header-center h1 { font-size: 1rem !important; color: #2B4590 !important; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 1px; }
      #reloj { font-size: 1.3rem !important; color: #1a3a7a !important; font-weight: bold; letter-spacing: 1px; }

      /* SELECTOR DE EMISORA */
      #selector-emisora {
        width: 100%;
        max-width: 620px;
        margin: 0 auto 10px auto;
        display: flex;
        gap: 0;
        box-sizing: border-box;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      }
      .tab-emisora {
        flex: 1;
        padding: 12px 10px;
        text-align: center;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        border: none;
        background: #e8ecf8;
        color: #2B4590;
        letter-spacing: 0.5px;
        transition: background 0.2s, color 0.2s;
        outline: none;
      }
      .tab-emisora:first-child { border-right: 1px solid #c5cde8; }
      .tab-emisora.activa-tab {
        background: #2B4590;
        color: #fff;
      }
      .tab-emisora:hover:not(.activa-tab) { background: #d0d8f0; }

      /* Widget oculto (tecnologia intacta) */
      #widget-vivo { display: none !important; }
      .label-vivo { display: none; }
      #song-title { display: none; }
    
  .status-dot {
    height: 8px;
    width: 8px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }
  .dot-local { background-color: #28a745; box-shadow: 0 0 5px #28a745; }
  .dot-cloud { background-color: #007bff; box-shadow: 0 0 5px #007bff; }
.amarillo { background-color: #FFFF00 !important; color: #000 !important; }
.bg-azul { background-color: #0070C0 !important; color: #fff !important; }
.bg-verde { background-color: #00B050 !important; color: #fff !important; }

  /* Radio Ritmo: idéntica a tabla Copán */
  #tabla-ritmo { width: 100%; max-width: 620px; margin: 0 auto 10px auto; border-collapse: collapse; font-size: 0.93em; }

</style>
</head>

function abrirModal(cliente) {

// Reloj y flecha
function actualizar() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const total = h*60+m;
  const ampm = h>=12?"PM":"AM", h12=h%12||12, mm=String(m).padStart(2,"0");
  document.getElementById("reloj").textContent = `${h12}:${mm} ${ampm}`;

  let activaIdx = -1;
  for(let i=0; i<activas.length; i++) { if(total>=activas[i].min) activaIdx=i; }

  activas.forEach((_,i) => {
    document.getElementById("fila-"+i).classList.remove("activa");
    document.getElementById("flecha-"+i).textContent="";
  });
  if(activaIdx>=0) {
    const tr = document.getElementById("fila-"+activaIdx);
    tr.classList.add("activa");
    document.getElementById("flecha-"+activaIdx).textContent="👈🏻";
    // tr.scrollIntoView({behavior:"smooth", block:"center"});
  }

  // Flecha LRDR
  let lrdrIdx = -1;
  for(let i=0; i<lrdr.length; i++) { if(total>=lrdr[i].min) lrdrIdx=i; }
  lrdr.forEach((_,i) => {
    const el = document.getElementById("flecha-lrdr-"+i);
    const tr = document.getElementById("fila-lrdr-"+i);
    if(el) el.textContent="";
    if(tr) tr.classList.remove("activa");
  });
  if(lrdrIdx>=0) {
    const tr = document.getElementById("fila-lrdr-"+lrdrIdx);
    const el = document.getElementById("flecha-lrdr-"+lrdrIdx);
    if(tr) tr.classList.add("activa");
    if(el) el.textContent="👈🏻";
  }
}
actualizar();
setInterval(actualizar, 30000);

  document.getElementById('tab-ritmo').classList.toggle('activa-tab', emisora === 'ritmo');

  var logoCopan = document.getElementById('logo-copan');

  if (logoRitmo) logoRitmo.style.display = (emisora === 'ritmo') ? '' : 'none';
}

    <script>
const NOW_PLAYING_TOPIC = "gic-copan-stereo-ba1c1afb47079f3edc220196b5b5aa97";
const NOW_PLAYING_BASE = "https://ntfy.sh/" + NOW_PLAYING_TOPIC;
let nowPlayingSource = null;

function mostrarTemaEnVivo(song) {
  const display = document.getElementById("song-display");
  const dot = document.getElementById("dot");
  const limpio = String(song || "").trim();
  if (!limpio) return;
  display.textContent = limpio.toUpperCase();
  dot.className = "status-dot dot-local";
  dot.title = "Conectado en tiempo real";
}

async function cargarUltimoTema() {
  try {
    const r = await fetch(NOW_PLAYING_BASE + "/json?poll=1&since=latest", {
      cache: "no-store"
    });
    const lineas = (await r.text()).trim().split(/\r?\n/).filter(Boolean);
    for (let i = lineas.length - 1; i >= 0; i--) {
      const data = JSON.parse(lineas[i]);
      if (data.event === "message" && data.message) {
        mostrarTemaEnVivo(data.message);
        return;
      }
    }
  } catch (e) {}
}

function conectarTemaEnVivo() {
  if (nowPlayingSource) nowPlayingSource.close();
  nowPlayingSource = new EventSource(NOW_PLAYING_BASE + "/sse?since=latest");

  nowPlayingSource.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.event === "message" && data.message) {
        mostrarTemaEnVivo(data.message);
      }
    } catch (e) {}
  };

  nowPlayingSource.onerror = () => {
    const dot = document.getElementById("dot");
    dot.className = "status-dot";
    dot.title = "Reconectando...";
  };
}

cargarUltimoTema().finally(conectarTemaEnVivo);
</script>
